{% extends "base.html" %}
{% block title %}Log in — ClauseGuard{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block header %}{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="card auth-card">
    <span class="wordmark">Clause<span style="color:var(--redline)">Guard</span></span>
    <span class="tagline">// automated contract risk review</span>

    <form method="post" action="{{ url_for('auth.login_page') }}" novalidate>
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus>
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Log in</button>
    </form>

    <p class="auth-switch">
      New to ClauseGuard? <a href="{{ url_for('auth.register_page') }}">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
